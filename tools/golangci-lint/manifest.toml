[tool]
name = "golangci-lint"
description = "Go linter"
capabilities = ["linter"]

[tool.download]
url = "https://github.com/golangci/golangci-lint/releases/download/v1.61.0/golangci-lint-1.61.0-linux-amd64.tar.gz"
executable_name = "golangci-lint"
[linter]
command = "golangci-lint"
args = ["run", "--fix"]
