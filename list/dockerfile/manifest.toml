[language]
name = "dockerfile"
extensions = ["Dockerfile", "dockerfile"]
aliases = ["dockerfile"]
root_markers = [".git"]

[language.comments]
line = "#"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "camdencheek/tree-sitter-dockerfile"
download_url = "https://github.com/camdencheek/tree-sitter-dockerfile/releases/latest/download/tree-sitter-dockerfile.wasm"

[lsp]
name = "dockerfile-language-server"
download_url = "https://registry.npmjs.org/dockerfile-language-server-nodejs/-/dockerfile-language-server-nodejs-latest.tgz"
command = "docker-langserver"
args = ["--stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = "docker build -f {src} -t test-build ."
run_cmd = ""
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore = [
    "**/.git/**",
    "**/.cache/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/tmp/**",
    "**/temp/**",
]
