[language]
name = "json"
extensions = ["json"]
aliases = ["json"]
root_markers = [".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "prebuilt"
repo = "tree-sitter/tree-sitter-json"
download_url = "https://github.com/tree-sitter/tree-sitter-json/releases/latest/download/tree-sitter-json.wasm"

[lsp]
name = "vscode-json-language-server"
download_url = "https://registry.npmjs.org/vscode-langservers-extracted/-/vscode-langservers-extracted-latest.tgz"
command = "vscode-json-language-server"
args = ["--stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = "python3 -m json.tool {src} > /dev/null"
run_cmd = ""
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore = [
    "**/node_modules/**",
    "**/target/**",
    "**/.git/**",
    "**/dist/**",
    "**/build/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/.cache/**",
    "**/coverage/**",
    "**/__pycache__/**",
    "**/.pytest_cache/**",
    "**/vendor/**",
    "**/.venv/**",
    "**/venv/**",
    "**/out/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/tmp/**",
    "**/temp/**",
]
