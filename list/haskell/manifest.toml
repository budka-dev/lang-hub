[language]
name = "haskell"
extensions = ["hs", "lhs"]
aliases = ["haskell"]
root_markers = []

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "prebuilt"
repo = "tree-sitter/tree-sitter-haskell"
download_url = "https://github.com/tree-sitter/tree-sitter-haskell/releases/latest/download/tree-sitter-haskell.wasm"

[lsp]
name = "haskell-language-server"
download_url = "https://github.com/haskell/haskell-language-server/releases/latest/download/haskell-language-server-{os}-{arch}.tar.xz"
command = "haskell-language-server-wrapper"
args = ["--lsp"]

[lsp.init_options]
[sandbox]
compile_cmd = "ghc -o {out} {src}"
run_cmd = "./{out}"
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore = [
    "**/node_modules/**",
    "**/target/**",
    "**/.git/**",
    "**/dist/**",
    "**/build/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/.cache/**",
    "**/coverage/**",
    "**/__pycache__/**",
    "**/.pytest_cache/**",
    "**/vendor/**",
    "**/.venv/**",
    "**/venv/**",
    "**/out/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/tmp/**",
    "**/temp/**",
]
