[language]
name = "c"
extensions = ["c", "h"]
aliases = ["c"]
root_markers = ["CMakeLists.txt", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "tree-sitter/tree-sitter-c"
download_url = "https://github.com/tree-sitter/tree-sitter-c/releases/latest/download/tree-sitter-c.wasm"

[lsp]
name = "clangd"
download_url = "https://github.com/clangd/clangd/releases/latest/download/clangd-{os}-{arch}.zip"
command = "clangd"

[lsp.init_options]
[sandbox]
compile_cmd = "gcc -o {out} {src}"
run_cmd = "./{out}"
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/build/**",
    "**/out/**",
    "**/bin/**",
    "**/obj/**",
]
