[language]
name = "swift"
extensions = ["swift"]

[parser]
type = "wasm"
# Needs CI build - no official WASM release
source = "build"
repo = "alex-pinkus/tree-sitter-swift"
# Will be built by CI and stored locally
download_url = "./parser/tree-sitter-swift.wasm"

[lsp]
name = "sourcekit-lsp"
# Binaries are not provided on GitHub Releases. Installed as part of the official Swift toolchain (swift.org).
download_url = ""
command = "sourcekit-lsp"

[sandbox]
compile_cmd = "swift build"
run_cmd = "swift run"
