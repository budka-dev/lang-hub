[language]
name = "csharp"
extensions = ["cs"]
aliases = ["csharp"]
root_markers = ["*.sln", "*.csproj", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "tree-sitter/tree-sitter-c-sharp"
download_url = "https://github.com/tree-sitter/tree-sitter-c-sharp/releases/latest/download/tree-sitter-c-sharp.wasm"

[lsp]
name = "omnisharp"
download_url = "https://github.com/OmniSharp/omnisharp-roslyn/releases/latest/download/omnisharp-{os}-{arch}.tar.gz"
command = "omnisharp"
args = ["-lsp"]

[lsp.init_options]
[sandbox]
compile_cmd = "dotnet build -o {out_dir} {src}"
run_cmd = "dotnet {out}"
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore = [
    "**/.git/**",
    "**/.cache/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/tmp/**",
    "**/temp/**",
    "**/build/**",
    "**/out/**",
    "**/bin/**",
    "**/obj/**",
]
