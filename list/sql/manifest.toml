[language]
name = "sql"
extensions = ["sql"]
aliases = ["sql"]
root_markers = [".git"]

[language.comments]
line = "--"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
# Needs CI build - no official WASM release
source = "build"
repo = "DerekStride/tree-sitter-sql"
# Will be built by CI and stored locally
download_url = "./parser/tree-sitter-sql.wasm"

[lsp]
name = "sql-language-server"
download_url = "https://registry.npmjs.org/sql-language-server/-/sql-language-server-latest.tgz"
command = "sql-language-server"
args = ["up", "--method", "stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = "sqlite3 :memory: '.read {src}'"
run_cmd = ""
test_cmd = ""

[formatter]
tool = "sqlfluff"
args = ["{src}"]

[linter]
tool = "sqlfluff"
args = ["{src}"]
