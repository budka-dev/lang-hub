[language]
name = "toml"
extensions = ["toml"]
aliases = ["toml"]
root_markers = [".git"]

[language.comments]
line = "#"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "tree-sitter/tree-sitter-toml"
download_url = "https://github.com/tree-sitter/tree-sitter-toml/releases/latest/download/tree-sitter-toml.wasm"

[lsp]
name = "taplo"
download_url = "https://github.com/tamasfe/taplo/releases/latest/download/taplo-{os}-{arch}.gz"
command = "taplo"
args = ["lsp", "stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = ""
run_cmd = ""

[formatter]
tool = "taplo"
args = ["{src}"]

[linter]
tool = "taplo"
args = ["{src}"]
