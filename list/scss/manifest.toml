[language]
name = "scss"
extensions = ["scss", "sass"]
aliases = ["scss"]
root_markers = ["package.json", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "tree-sitter-grammars/tree-sitter-scss"
download_url = "https://github.com/tree-sitter/tree-sitter-scss/releases/latest/download/tree-sitter-scss.wasm"

[lsp]
name = "vscode-css-language-server"
download_url = "https://registry.npmjs.org/vscode-langservers-extracted/-/vscode-langservers-extracted-latest.tgz"
command = "vscode-css-language-server"
args = ["--stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = "sass {src} {out}.css"
run_cmd = ""
test_cmd = ""

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/node_modules/**",
    "**/dist/**",
    "**/build/**",
    "**/out/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/coverage/**",
]
