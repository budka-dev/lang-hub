[language]
name = "cpp"
extensions = ["cpp", "cc", "cxx", "hpp", "hh", "hxx"]
aliases = ["cpp"]
root_markers = ["CMakeLists.txt", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "tree-sitter/tree-sitter-cpp"
download_url = "https://github.com/tree-sitter/tree-sitter-cpp/releases/latest/download/tree-sitter-cpp.wasm"

[lsp]
name = "clangd"
download_url = "https://github.com/clangd/clangd/releases/latest/download/clangd-{os}-{arch}.zip"
command = "clangd"

[lsp.init_options]
[sandbox]
compile_cmd = "g++ -std=c++17 -o {out} {src}"
run_cmd = "./{out}"
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore = [
    "**/.git/**",
    "**/.cache/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/tmp/**",
    "**/temp/**",
    "**/build/**",
    "**/out/**",
    "**/bin/**",
    "**/obj/**",
]
