[language]
name = "vue"
extensions = ["vue"]
aliases = ["vue"]
root_markers = ["package.json", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "tree-sitter-grammars/tree-sitter-vue"
download_url = "https://github.com/tree-sitter-grammars/tree-sitter-vue/releases/latest/download/tree-sitter-vue.wasm"

[lsp]
name = "volar"
download_url = "https://registry.npmjs.org/@volar/vue-language-server/-/vue-language-server-latest.tgz"
command = "vue-language-server"
args = ["--stdio"]
tool = "vue-language-server"

[lsp.init_options]
[sandbox]
compile_cmd = "vue-tsc --noEmit {src}"
run_cmd = "npm run dev"
test_cmd = ""

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/node_modules/**",
    "**/dist/**",
    "**/build/**",
    "**/out/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/coverage/**",
]

[formatter]
tool = "biome"
args = ["{src}"]

[linter]
tool = "biome"
args = ["{src}"]
