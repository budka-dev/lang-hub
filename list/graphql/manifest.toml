[language]
name = "graphql"
extensions = ["graphql", "gql"]
aliases = ["graphql"]
root_markers = [".git"]

[language.comments]
line = "#"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "bkegley/tree-sitter-graphql"
download_url = "https://github.com/bkegley/tree-sitter-graphql/releases/latest/download/tree-sitter-graphql.wasm"

[lsp]
name = "graphql-language-service-cli"
download_url = "https://registry.npmjs.org/graphql-language-service-cli/-/graphql-language-service-cli-latest.tgz"
command = "graphql-lsp"
args = ["server", "-m", "stream"]

[lsp.init_options]
[sandbox]
compile_cmd = "node -e \"const { parse } = require('graphql'); parse(require('fs').readFileSync('{src}', 'utf8'))\""
run_cmd = ""
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore = [
    "**/node_modules/**",
    "**/target/**",
    "**/.git/**",
    "**/dist/**",
    "**/build/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/.cache/**",
    "**/coverage/**",
    "**/__pycache__/**",
    "**/.pytest_cache/**",
    "**/vendor/**",
    "**/.venv/**",
    "**/venv/**",
    "**/out/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/tmp/**",
    "**/temp/**",
]
