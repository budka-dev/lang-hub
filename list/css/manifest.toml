[language]
name = "css"
extensions = ["css"]
aliases = ["css"]
root_markers = ["package.json", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "prebuilt"
repo = "tree-sitter/tree-sitter-css"
download_url = "https://github.com/tree-sitter/tree-sitter-css/releases/latest/download/tree-sitter-css.wasm"

[lsp]
name = "vscode-css-language-server"
download_url = "https://registry.npmjs.org/vscode-langservers-extracted/-/vscode-langservers-extracted-latest.tgz"
command = "vscode-css-language-server"
args = ["--stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = ""
run_cmd = ""
test_cmd = ""

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/node_modules/**",
    "**/dist/**",
    "**/build/**",
    "**/out/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/coverage/**",
]

[formatter]
tool = "biome"
args = ["{src}"]

[linter]
tool = "biome"
args = ["{src}"]
