[language]
name = "css"
extensions = ["css"]

[parser]
type = "wasm"
source = "prebuilt"
repo = "tree-sitter/tree-sitter-css"
download_url = "https://github.com/tree-sitter/tree-sitter-css/releases/latest/download/tree-sitter-css.wasm"

[lsp]
name = "vscode-css-language-server"
download_url = "https://registry.npmjs.org/vscode-langservers-extracted/-/vscode-langservers-extracted-latest.tgz"
command = "vscode-css-language-server"
args = ["--stdio"]

[sandbox]
compile_cmd = ""
run_cmd = ""
