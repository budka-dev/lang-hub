[language]
name = "php"
extensions = ["php", "phtml", "php3", "php4", "php5", "php7", "php8"]
aliases = ["php"]
root_markers = ["composer.json", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "prebuilt"
repo = "tree-sitter/tree-sitter-php"
download_url = "https://github.com/tree-sitter/tree-sitter-php/releases/latest/download/tree-sitter-php.wasm"

[lsp]
name = "intelephense"
download_url = "https://registry.npmjs.org/intelephense/-/intelephense-latest.tgz"
command = "intelephense"
args = ["--stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = "php -l {src}"
run_cmd = "php {src}"
package_manager = "composer"
test = ["vendor/bin/phpunit"]
script = ["php", "{src}"]
repl = ["php", "-a"]

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/vendor/**",
]

[formatter]
tool = "php-cs-fixer"
args = ["{src}"]

[linter]
tool = "phpstan"
args = ["{src}"]
