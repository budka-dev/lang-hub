[language]
name = "svelte"
extensions = ["svelte"]
aliases = ["svelte"]
root_markers = ["package.json", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "Himujjal/tree-sitter-svelte"
download_url = "https://github.com/Himujjal/tree-sitter-svelte/releases/latest/download/tree-sitter-svelte.wasm"

[lsp]
name = "svelte-language-server"
download_url = "https://registry.npmjs.org/svelte-language-server/-/svelte-language-server-latest.tgz"
command = "svelteserver"
args = ["--stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = "svelte-check --workspace {src}"
run_cmd = "npm run dev"
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore = [
    "**/node_modules/**",
    "**/target/**",
    "**/.git/**",
    "**/dist/**",
    "**/build/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/.cache/**",
    "**/coverage/**",
    "**/__pycache__/**",
    "**/.pytest_cache/**",
    "**/vendor/**",
    "**/.venv/**",
    "**/venv/**",
    "**/out/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/tmp/**",
    "**/temp/**",
]
