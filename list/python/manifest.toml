[language]
name = "python"
extensions = ["py", "pyw", "pyi"]
aliases = ["py", "python"]
root_markers = ["pyproject.toml", "setup.py", ".git"]

[language.comments]
line = "#"
block = ["\"\"\"", "\"\"\""]
doc = "\"\"\""
[parser]
type = "wasm"
source = "prebuilt"
repo = "tree-sitter/tree-sitter-python"
download_url = "https://github.com/tree-sitter/tree-sitter-python/releases/latest/download/tree-sitter-python.wasm"

[lsp]
name = "pyright"
download_url = "https://registry.npmjs.org/pyright/-/pyright-latest.tgz"
command = "pyright-langserver"
args = ["--stdio"]
tool = "ruff"

[lsp.init_options]
[sandbox]
compile_cmd = "python3 -m py_compile {src}"
run_cmd = "python3 {src}"
test_cmd = ""

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/__pycache__/**",
    "**/.pytest_cache/**",
    "**/.venv/**",
    "**/venv/**",
    "**/.tox/**",
    "**/build/**",
    "**/dist/**",
]

[formatter]
tool = "ruff"
args = ["{src}"]

[linter]
tool = "ruff"
args = ["{src}"]
