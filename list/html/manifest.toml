[language]
name = "html"
extensions = ["html", "htm", "xhtml"]
aliases = ["html"]
root_markers = ["package.json", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "prebuilt"
repo = "tree-sitter/tree-sitter-html"
download_url = "https://github.com/tree-sitter/tree-sitter-html/releases/latest/download/tree-sitter-html.wasm"

[lsp]
name = "vscode-html-language-server"
download_url = "https://registry.npmjs.org/vscode-langservers-extracted/-/vscode-langservers-extracted-latest.tgz"
command = "vscode-html-language-server"
args = ["--stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = ""
run_cmd = ""
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore = [
    "**/node_modules/**",
    "**/target/**",
    "**/.git/**",
    "**/dist/**",
    "**/build/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/.cache/**",
    "**/coverage/**",
    "**/__pycache__/**",
    "**/.pytest_cache/**",
    "**/vendor/**",
    "**/.venv/**",
    "**/venv/**",
    "**/out/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/tmp/**",
    "**/temp/**",
]
