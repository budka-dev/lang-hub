[language]
name = "rust"
extensions = ["rs"]
aliases = ["rs", "rust"]
root_markers = ["Cargo.toml"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
# Official pre-built WASM from tree-sitter org
source = "prebuilt"
repo = "tree-sitter/tree-sitter-rust"
download_url = "https://github.com/tree-sitter/tree-sitter-rust/releases/latest/download/tree-sitter-rust.wasm"

[lsp]
name = "rust-analyzer"
download_url = "https://github.com/rust-lang/rust-analyzer/releases/latest/download/rust-analyzer-{os}-{arch}.gz"
command = "rust-analyzer"
tool = "rust-analyzer"

[lsp.init_options]
[sandbox]
compile_cmd = "rustc -o {out} {src}"
run_cmd = "./{out}"
test_cmd = ""

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/target/**",
]

[formatter]
tool = "rustfmt"
args = ["{src}"]

[linter]
tool = "clippy"
args = ["{src}"]
