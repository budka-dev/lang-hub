[language]
name = "elixir"
extensions = ["ex", "exs"]
aliases = ["ex", "exs", "elixir"]
root_markers = ["mix.exs"]

[language.comments]
line = "#"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "elixir-lang/tree-sitter-elixir"
download_url = "https://github.com/elixir-lang/tree-sitter-elixir/releases/latest/download/tree-sitter-elixir.wasm"

[lsp]
name = "elixir-ls"
download_url = "https://github.com/elixir-lsp/elixir-ls/releases/download/v0.30.0/elixir-ls-v0.30.0.zip"
command = "language_server.sh"

[lsp.init_options]
[sandbox]
compile_cmd = "elixirc {src}"
run_cmd = "elixir {src}"
package_manager = "mix"
test = ["mix", "test"]
build = ["mix", "compile"]
repl = ["iex"]

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/_build/**",
    "**/deps/**",
    "**/doc/**",
]

[formatter]
tool = "mix"
args = ["{src}"]

[linter]
tool = "mix"
args = ["{src}"]
