[language]
name = "java"
extensions = ["java"]
aliases = ["java"]
root_markers = ["build.gradle", "pom.xml", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "prebuilt"
repo = "tree-sitter/tree-sitter-java"
download_url = "https://github.com/tree-sitter/tree-sitter-java/releases/latest/download/tree-sitter-java.wasm"

[lsp]
name = "jdtls"
download_url = "https://download.eclipse.org/jdtls/snapshots/jdt-language-server-latest.tar.gz"
command = "jdtls"

[lsp.init_options]
[sandbox]
compile_cmd = "javac -d . {src}"
run_cmd = "java {class_name}"
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore = [
    "**/.git/**",
    "**/.cache/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/tmp/**",
    "**/temp/**",
    "**/target/**",
    "**/build/**",
    "**/.gradle/**",
]
