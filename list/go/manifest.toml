[language]
name = "go"
extensions = ["go"]
aliases = ["go"]
root_markers = ["go.mod"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "prebuilt"
repo = "tree-sitter/tree-sitter-go"
download_url = "https://github.com/tree-sitter/tree-sitter-go/releases/latest/download/tree-sitter-go.wasm"

[lsp]
name = "gopls"
# Binaries are not provided on GitHub Releases. Install via: go install golang.org/x/tools/gopls@latest
download_url = ""
command = "gopls"

[lsp.init_options]
[sandbox]
compile_cmd = "go build -o {out} {src}"
run_cmd = "./{out}"
test_cmd = ""

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/vendor/**",
    "**/bin/**",
    "**/pkg/**",
]
