[language]
name = "ruby"
extensions = ["rb", "rbw", "rake", "gemspec"]
aliases = ["rb", "ruby"]
root_markers = ["Gemfile", ".git"]

[language.comments]
line = "#"
block = ["=begin", "=end"]
doc = "///"
[parser]
type = "wasm"
source = "prebuilt"
repo = "tree-sitter/tree-sitter-ruby"
download_url = "https://github.com/tree-sitter/tree-sitter-ruby/releases/latest/download/tree-sitter-ruby.wasm"

[lsp]
name = "solargraph"
download_url = "https://rubygems.org/downloads/solargraph-0.50.0.gem"
command = "solargraph"
args = ["stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = "ruby -c {src}"
run_cmd = "ruby {src}"
test_cmd = ""

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/vendor/**",
    "**/coverage/**",
]
