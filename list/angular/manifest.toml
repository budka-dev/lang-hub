[language]
name = "angular"
extensions = ["ts", "html", "css", "scss"]
aliases = ["angular"]
root_markers = ["package.json", ".git"]

[language.comments]
line = "//"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "tree-sitter/tree-sitter-typescript"
download_url = "https://github.com/tree-sitter/tree-sitter-typescript/releases/latest/download/tree-sitter-typescript.wasm"

[lsp]
name = "angular-language-server"
download_url = "https://registry.npmjs.org/@angular/language-server/-/language-server-latest.tgz"
command = "ngserver"
args = ["--stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = "ng build --dry-run"
run_cmd = "ng serve"
test_cmd = ""

[indexer]
# Directories and patterns to exclude from indexing
ignore_folders = [
    "**/node_modules/**",
    "**/dist/**",
    "**/build/**",
    "**/out/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/coverage/**",
]

[formatter]
tool = "prettier"
args = ["{src}"]
