[language]
name = "yaml"
extensions = ["yaml", "yml"]
aliases = ["yaml"]
root_markers = [".git"]

[language.comments]
line = "#"
block = ["/*", "*/"]
doc = "///"
[parser]
type = "wasm"
source = "build"
repo = "tree-sitter-grammars/tree-sitter-yaml"
download_url = "https://github.com/tree-sitter-grammars/tree-sitter-yaml/releases/latest/download/tree-sitter-yaml.wasm"

[lsp]
name = "yaml-language-server"
download_url = "https://registry.npmjs.org/yaml-language-server/-/yaml-language-server-latest.tgz"
command = "yaml-language-server"
args = ["--stdio"]

[lsp.init_options]
[sandbox]
compile_cmd = "python3 -c 'import yaml; yaml.safe_load(open(\"{src}\"))'"
run_cmd = ""
test_cmd = ""

[formatter]
command = ""
args = []

[linter]
command = ""
args = []

[indexer]
# Directories and patterns to exclude from indexing
ignore = [
    "**/node_modules/**",
    "**/target/**",
    "**/.git/**",
    "**/dist/**",
    "**/build/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/.cache/**",
    "**/coverage/**",
    "**/__pycache__/**",
    "**/.pytest_cache/**",
    "**/vendor/**",
    "**/.venv/**",
    "**/venv/**",
    "**/out/**",
    "**/.idea/**",
    "**/.vscode/**",
    "**/tmp/**",
    "**/temp/**",
]
