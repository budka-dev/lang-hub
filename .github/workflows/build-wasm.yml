name: Build Tree-sitter WASM Parsers

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'list/**/manifest.toml'
  workflow_dispatch:
    inputs:
      language:
        description: 'Specific language to build (leave empty for all)'
        required: false
        type: string

env:
  TREE_SITTER_VERSION: "0.26.7"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─── Step 1: Detect which languages need building ───
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed manifests
        id: changes
        run: |
          LANGUAGES=""

          if [ -n "${{ inputs.language }}" ]; then
            # Manual trigger for specific language
            LANGUAGES="${{ inputs.language }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger for all
            LANGUAGES=$(find ./list -name "manifest.toml" -exec dirname {} \; | xargs -I{} basename {} | sort)
          else
            # Auto-detect changed manifests
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            LANGUAGES=$(echo "$CHANGED_FILES" | grep "^list/.*/manifest.toml$" | cut -d'/' -f2 | sort -u)

            # If workflow file changed, rebuild all
            if echo "$CHANGED_FILES" | grep -q "build-wasm.yml"; then
              LANGUAGES=$(find ./list -name "manifest.toml" -exec dirname {} \; | xargs -I{} basename {} | sort)
            fi
          fi

          # Build JSON matrix, only for languages with source = "build"
          ITEMS=""
          for lang in $LANGUAGES; do
            manifest="list/$lang/manifest.toml"
            if [ ! -f "$manifest" ]; then
              echo "WARNING: No manifest for $lang"
              continue
            fi

            REPO=$(grep '^repo = ' "$manifest" | cut -d'"' -f2)
            SOURCE=$(grep '^source = ' "$manifest" | cut -d'"' -f2)

            if [ -z "$REPO" ]; then
              echo "WARNING: No repo for $lang, skipping"
              continue
            fi

            # Only build languages that need it (source = "build")
            # Prebuilt languages already have official WASM
            if [ "$SOURCE" != "build" ]; then
              echo "SKIP: $lang is prebuilt, no need to compile"
              continue
            fi

            if [ -n "$ITEMS" ]; then
              ITEMS="$ITEMS,"
            fi
            ITEMS="$ITEMS{\"language\":\"$lang\",\"repo\":\"$REPO\"}"
            echo "QUEUE: $lang -> $REPO"
          done

          MATRIX="{\"include\":[$ITEMS]}"
          HAS_CHANGES="false"
          if [ -n "$ITEMS" ]; then
            HAS_CHANGES="true"
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "has_changes=$HAS_CHANGES" >> $GITHUB_OUTPUT

  # ─── Step 2: Build WASM parsers in parallel ───
  build-wasm:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    container:
      image: emscripten/emsdk:latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli@${{ env.TREE_SITTER_VERSION }}

      - name: Verify Emscripten
        run: |
          emcc --version
          which emcc

      - name: Clone parser source
        run: git clone --depth 1 https://github.com/${{ matrix.repo }}.git parser-src

      - name: Build WASM
        run: |
          cd parser-src

          OUT_PATH="$GITHUB_WORKSPACE/parser-src/tree-sitter-${{ matrix.language }}.wasm"

          if [ -d "${{ matrix.language }}" ] && [ -f "${{ matrix.language }}/grammar.js" ]; then
            cd "${{ matrix.language }}"
          elif [ ! -f "grammar.js" ] && [ ! -f "src/parser.c" ]; then
            SUBDIR=$(dirname "$(find . -name grammar.js | head -n 1)")
            if [ -n "$SUBDIR" ]; then
              cd "$SUBDIR"
            fi
          fi

          if [ -f "tree-sitter.json" ]; then
            jq 'del(.links)' tree-sitter.json > tmp.json && mv tmp.json tree-sitter.json || true
          fi

          if [ ! -f "src/parser.c" ] && [ -f "grammar.js" ]; then
            echo "Generating parser from grammar.js..."
            tree-sitter generate
          fi

          tree-sitter build --wasm -o "$OUT_PATH"

          ls -lh "$OUT_PATH"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: tree-sitter-${{ matrix.language }}
          path: parser-src/tree-sitter-${{ matrix.language }}.wasm
          retention-days: 90

  # ─── Step 3: Commit WASM files and create release ───
  release:
    needs: [detect-changes, build-wasm]
    if: always() && needs.detect-changes.result == 'success' && (needs.build-wasm.result == 'success' || needs.build-wasm.result == 'skipped') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all built WASM artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts
          pattern: tree-sitter-*

      - name: Place WASM files into language directories
        run: |
          BUILT_LANGS=""
          shopt -s nullglob
          for artifact_dir in artifacts/tree-sitter-*/; do
            # Extract language name: artifacts/tree-sitter-swift/ -> swift
            lang=$(basename "$artifact_dir" | sed 's/tree-sitter-//')
            wasm_file=$(find "$artifact_dir" -name "*.wasm" | head -1)

            if [ -n "$wasm_file" ] && [ -f "$wasm_file" ]; then
              mkdir -p "list/$lang/parser"
              cp "$wasm_file" "list/$lang/parser/"
              echo "Placed: list/$lang/parser/$(basename "$wasm_file")"
              BUILT_LANGS="$BUILT_LANGS $lang"
            fi
          done

          echo "BUILT_LANGS=$BUILT_LANGS" >> $GITHUB_ENV

      - name: Download prebuilt WASM files
        run: |
          PREBUILT_LANGS=""
          for manifest in list/*/manifest.toml; do
            lang=$(basename $(dirname "$manifest"))
            SOURCE=$(awk -F'"' '/^source[ \t]*=[ \t]*/ {print $2}' "$manifest" | head -1)
            if [ "$SOURCE" = "prebuilt" ]; then
              URL=$(awk -F'"' '/^download_url[ \t]*=[ \t]*/ {print $2}' "$manifest" | head -1)
              if [ -n "$URL" ]; then
                echo "Downloading prebuilt WASM for $lang..."
                mkdir -p "list/$lang/parser"
                curl -L -s -o "list/$lang/parser/tree-sitter-$lang.wasm" "$URL"
                if [ -f "list/$lang/parser/tree-sitter-$lang.wasm" ]; then
                  PREBUILT_LANGS="$PREBUILT_LANGS $lang"
                fi
              fi
            fi
          done
          echo "BUILT_LANGS=${BUILT_LANGS}${PREBUILT_LANGS}" >> $GITHUB_ENV

      - name: Commit WASM files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add list/*/parser/*.wasm

          if git diff --staged --quiet; then
            echo "No new WASM files to commit"
          else
            git commit -m "build(wasm): compile parsers for${{ env.BUILT_LANGS }}"
            git push
          fi

      - name: Generate release tag
        if: env.SKIP_RELEASE != 'true'
        run: |
          # Semantic date-based tag: v2025.03.21
          TAG="v$(date +'%Y.%m.%d')"

          # Append counter if tag already exists
          COUNTER=0
          FINAL_TAG="$TAG"
          while git tag -l "$FINAL_TAG" | grep -q .; do
            COUNTER=$((COUNTER + 1))
            FINAL_TAG="${TAG}.${COUNTER}"
          done

          echo "RELEASE_TAG=$FINAL_TAG" >> $GITHUB_ENV

      - name: Collect all WASM files for release
        if: env.SKIP_RELEASE != 'true'
        run: |
          mkdir -p release-assets
          find list -name "*.wasm" -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Generate release body
        if: env.SKIP_RELEASE != 'true'
        run: |
          cat > release-body.md << 'BODY'
          ## Tree-sitter WASM Parsers

          Pre-built WASM parsers for all supported languages.

          ### Download
          Each `.wasm` file can be used directly with tree-sitter's WASM runtime.

          ### Languages included
          BODY

          for wasm in release-assets/*.wasm; do
            name=$(basename "$wasm" .wasm | sed 's/tree-sitter-//')
            size=$(du -h "$wasm" | cut -f1)
            echo "- **$name** ($size)" >> release-body.md
          done

      - name: Create Versioned GitHub Release
        if: env.SKIP_RELEASE != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "WASM Parsers ${{ env.RELEASE_TAG }}"
          body_path: release-body.md
          files: release-assets/*.wasm
          make_latest: true

      - name: Update 'latest' GitHub Release
        if: env.SKIP_RELEASE != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Удаляем старый релиз и тег (если они есть), игнорируем ошибки
          gh release delete latest --cleanup-tag -y || true
          
          # Создаем новый релиз с тегом latest
          gh release create latest release-assets/*.wasm \
            --title "Latest WASM Parsers" \
            --notes-file release-body.md
